<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="stylesproducts.css">
</head>
<body>
    <section class="products-section">
        <h2>Our Menu</h2>
        <div class="products-grid">
            <div class="product-card">
                <img src="images/1-pc chicken.webp" alt="1-piece Chicken">
                <div class="info">
                    <h3>1-pc Chicken</h3>
                    <p class="price">PHP 79.00</p>
                    <button>Buy now</button>
                </div>
            </div>
            <div class="product-card">
                <img src="images/2pc-chicken.png" alt="2-piece Chicken">
                <div class="info">
                    <h3>2-pc Chicken</h3>
                    <p class="price">PHP 139.00</p>
                    <button>Buy now</button>
                </div>
            </div>
            <div class="product-card">
                <img src="images/Family-meal.jpg" alt="Family Meal">
                <div class="info">
                    <h3>Family Bucket</h3>
                    <p class="price">PHP 499.00</p>
                    <button>Buy now</button>
                </div>
            </div>
            <div class="product-card">
                <img src="images/apple-pie.webp" alt="Apple Pie">
                <div class="info">
                    <h3>Apple Pie</h3>
                    <p class="price">PHP 49.00</p>
                    <button>Buy now</button>
                </div>
            </div>
            <div class="product-card">
                <img src="images/halo-halo.jpg" alt="Halo Halo">
                <div class="info">
                    <h3>Halo-halo</h3>
                    <p class="price">PHP 69.00</p>
                    <button>Buy now</button>
                </div>
            </div>
            <div class="product-card">
                <img src="images/hotfudge-sundae.jpg" alt="Hot Fudge Sundae">
                <div class="info">
                    <h3>Hot Fudge Sundae</h3>
                    <p class="price">PHP 59.00</p>
                    <button>Buy now</button>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
