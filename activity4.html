<!DOCTYPE html>

<html>
    <head>
        <title>Activity 4</title>
    </head>
    <body>
        <h2>User Information Form</h2>
        <form action=""method="post">
            <label for="fname">First Name:</label><br>
            <input type="text"id="fname"name="firstname"required><br><br>

            <label for="lname">Last Name:</label><br>
            <input type="text"id="lname"name="lastname"required><br><br>

            <label for="age">Age:</label><br>
            <input type="number"id="age"name="age"><br><br>

            <label>Gender:</label><br>
            <input type="radio"id="male"name="gender"value="male">
            <label for="male">Male</label>
            <input type="radio"id="female"name="gender"value="female">
            <label for="female">Female</label>
            <input type="radio"id="other"name="gender"value="other">
            <label for="other">Other</label><br><br>

            <label>Hobbies:</label><br>
            <input type="checkbox"id="hobby1"name="hobby"value="Gaming">
            <label for="hobby1">Gaming</label><br>
            <input type="checkbox"id="hobby2"name="hobby"value="Dancing">
            <label for="hobby2">Dancing</label><br>
            <input type="checkbox"id="hobby3"name="hobby"value="Exercising">
            <label for="hobby3">Exercising</label><br>
            <input type="checkbox"id="hobby4"name="hobby"value="Studying">
            <label for="hobby4">Studying</label><br>
            <input type="checkbox"id="hobby5"name="hobby"value="Sleeping">
            <label for="hobby5">Sleeping</label><br><br>

            <label for="year-level">Year Level:</label><br>
            <select id="year-level"name="year-level">
                <option value="1st Year">1st Year</option>
                <option value="2nd Year">2nd Year</option>
                <option value="3rd Year">3rd Year</option>
                <option value="4th Year">4th Year</option>
            </select><br><br>

            <button type="submit">Submit</button>
            <button type="reset">Clear</button>
        </form>
    </body>
</html>
